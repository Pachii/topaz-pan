name: Build Plugin Formats

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set version
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          if (-not $version -or $version -eq "main") {
            $content = Get-Content "PluginProcessor.h" -Raw
            $match = [regex]::Match($content, 'getVersionTag\(\)\s*\{\s*return\s*"([^"]+)"')
            if (-not $match.Success) {
              throw "Could not determine plugin version from PluginProcessor.h"
            }
            $version = $match.Groups[1].Value
          }

          "PLUGIN_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Configure
        run: cmake -S . -B build

      - name: Build Windows VST3
        run: cmake --build build --config Release --target AbstractWidener_VST3

      - name: Collect Windows VST3
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null

          $candidates = @(
            "build/AbstractWidener_artefacts/Release/VST3/topaz pan.vst3",
            "build/AbstractWidener_artefacts/VST3/topaz pan.vst3"
          )

          $source = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1

          if (-not $source) {
            throw "Could not find built Windows VST3 artifact."
          }

          Copy-Item -Recurse -Force $source "dist/topaz pan.vst3"
          Compress-Archive -Path "dist/topaz pan.vst3" -DestinationPath "dist/topaz-pan-$env:PLUGIN_VERSION-windows-vst3.zip" -Force

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build Windows installer
        shell: pwsh
        run: |
          $template = Get-Content "packaging/windows/topaz-pan.iss.in" -Raw
          $vst3Source = (Resolve-Path "dist/topaz pan.vst3").Path.Replace('\', '\\')
          $outputDir = (Resolve-Path "dist").Path.Replace('\', '\\')
          $script = $template.Replace("@DISPLAY_VERSION@", $env:PLUGIN_VERSION)
          $script = $script.Replace("@VST3_SOURCE@", $vst3Source)
          $script = $script.Replace("@OUTPUT_DIR@", $outputDir)
          Set-Content -Path "dist/topaz-pan.iss" -Value $script

          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "dist/topaz-pan.iss"

      - name: Upload Windows VST3 zip
        uses: actions/upload-artifact@v6
        with:
          name: topaz-pan-${{ env.PLUGIN_VERSION }}-windows-vst3
          path: dist/topaz-pan-${{ env.PLUGIN_VERSION }}-windows-vst3.zip
          if-no-files-found: error

      # Upload the raw installer file. GitHub wraps artifacts in its own archive,
      # but we do not create an additional zip around the .exe itself.
      - name: Upload Windows installer
        uses: actions/upload-artifact@v6
        with:
          name: topaz-pan-${{ env.PLUGIN_VERSION }}-windows-installer
          path: dist/topaz-pan-${{ env.PLUGIN_VERSION }}-windows-installer.exe
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set version
        run: |
          version="${{ github.ref_name }}"
          if [ -z "$version" ] || [ "$version" = "main" ]; then
            version="$(sed -n 's/.*getVersionTag() { return "\(.*\)"; }.*/\1/p' PluginProcessor.h | head -n 1)"
          fi

          if [ -z "$version" ]; then
            echo "Could not determine plugin version from PluginProcessor.h" >&2
            exit 1
          fi

          echo "PLUGIN_VERSION=$version" >> "$GITHUB_ENV"

      - name: Configure
        run: cmake -S . -B build

      - name: Build macOS VST3 and AU
        run: cmake --build build --config Release --target AbstractWidener_VST3 AbstractWidener_AU

      - name: Collect macOS plugin formats
        run: |
          mkdir -p dist

          vst3_src=""
          for candidate in \
            "build/AbstractWidener_artefacts/Release/VST3/topaz pan.vst3" \
            "build/AbstractWidener_artefacts/VST3/topaz pan.vst3"
          do
            if [ -e "$candidate" ]; then
              vst3_src="$candidate"
              break
            fi
          done

          au_src=""
          for candidate in \
            "build/AbstractWidener_artefacts/Release/AU/topaz pan.component" \
            "build/AbstractWidener_artefacts/AU/topaz pan.component"
          do
            if [ -e "$candidate" ]; then
              au_src="$candidate"
              break
            fi
          done

          if [ -z "$vst3_src" ]; then
            echo "Could not find built macOS VST3 artifact." >&2
            exit 1
          fi

          if [ -z "$au_src" ]; then
            echo "Could not find built macOS AU artifact." >&2
            exit 1
          fi

          cp -R "$vst3_src" "dist/topaz pan.vst3"
          cp -R "$au_src" "dist/topaz pan.component"
          ditto -c -k --sequesterRsrc --keepParent "dist/topaz pan.vst3" "dist/topaz-pan-${PLUGIN_VERSION}-macos-vst3.zip"
          ditto -c -k --sequesterRsrc --keepParent "dist/topaz pan.component" "dist/topaz-pan-${PLUGIN_VERSION}-macos-au.zip"

      - name: Build macOS installer
        run: |
          chmod +x packaging/macos/build-installer.sh
          packaging/macos/build-installer.sh \
            "${PLUGIN_VERSION}" \
            "dist/topaz pan.vst3" \
            "dist/topaz pan.component" \
            "dist"

      - name: Upload macOS VST3 zip
        uses: actions/upload-artifact@v6
        with:
          name: topaz-pan-${{ env.PLUGIN_VERSION }}-macos-vst3
          path: dist/topaz-pan-${{ env.PLUGIN_VERSION }}-macos-vst3.zip
          if-no-files-found: error

      - name: Upload macOS AU zip
        uses: actions/upload-artifact@v6
        with:
          name: topaz-pan-${{ env.PLUGIN_VERSION }}-macos-au
          path: dist/topaz-pan-${{ env.PLUGIN_VERSION }}-macos-au.zip
          if-no-files-found: error

      # Upload the raw installer file. GitHub wraps artifacts in its own archive,
      # but we do not create an additional zip around the .pkg itself.
      - name: Upload macOS installer
        uses: actions/upload-artifact@v6
        with:
          name: topaz-pan-${{ env.PLUGIN_VERSION }}-macos-installer
          path: dist/topaz-pan-${{ env.PLUGIN_VERSION }}-macos-installer.pkg
          if-no-files-found: error
